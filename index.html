<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Wynstan — Team 5-Star Board</title>

<!--
  ============================================================================
  REPS & INSTALLERS BOARD  (staff-facing — 5-star wins only)
  ----------------------------------------------------------------------------
  Reads the SAME published CSVs as the main Wynstan reviews dashboard:
    - "All Reviews" tab CSV  -> CONFIG.csvUrl   (filtered to 5-star here)
    - "Staff" tab CSV        -> CONFIG.staffCsvUrl  (Name, Role -> rep/installer)
  Nothing below 5 stars is ever shown. Crediting uses the "Staff (manual)"
  override, falling back to the auto "Staff Mentioned" guess.
  ============================================================================
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #da487e;          /* Wynstan pink */
    --red-dark: #a7144c;     /* Wynstan deep berry */
    --dark: #27251f;         /* charcoal */
    --ink: #27251f;
    --muted: #736c67;
    --line: #e8e6e5;
    --soft: #f4efec;
    --card: #ffffff;
    --page: #f7f5f5;
    --good: #16a34a;
    --star: #f5a623;
    --gold: #d4a017;
    --silver: #9aa0a6;
    --bronze3: #b3703a;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font-family: "Roboto", system-ui, -apple-system, Arial, sans-serif;
    font-size: 15px; line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px 72px; }

  header.top { background: var(--dark); color: #fff; }
  .top-inner { max-width: 1080px; margin: 0 auto; padding: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .wordmark { font-weight: 900; font-size: 28px; letter-spacing: 1px; line-height: 1; text-transform: uppercase; }
  .wordmark span { color: var(--red); }
  .brand small { display: block; font-size: 12px; letter-spacing: 2px; color: #cfc9c4; text-transform: uppercase; margin-top: 6px; }
  .subtitle { font-size: 14px; color: rgba(255,255,255,.82); }
  .top a.sheet { display: inline-flex; align-items: center; gap: 7px; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,.35); padding: 8px 14px; border-radius: var(--radius); font-size: 13px; }
  .top a.sheet:hover { background: rgba(255,255,255,.1); }

  .toggle { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 4px; margin: 26px 0 4px; }
  .toggle button { font: inherit; font-weight: 700; border: 0; background: transparent; color: var(--muted); padding: 9px 22px; border-radius: 999px; cursor: pointer; }
  .toggle button.on { background: var(--red); color: #fff; }

  .section-label { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 30px 0 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .section-label select { font: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); }
  .section-label .spacer { flex: 1; }

  .podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 14px; align-items: end; margin-bottom: 8px; }
  @media (max-width: 620px) { .podium { grid-template-columns: 1fr; } }
  .pod { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px 14px; text-align: center; position: relative; }
  .pod.p1 { border-color: var(--gold); box-shadow: 0 6px 22px rgba(212,160,23,.18); }
  .pod .medal { font-size: 30px; line-height: 1; }
  .pod .pname { font-weight: 700; margin-top: 8px; font-size: 15.5px; }
  .pod .pcount { font-size: 34px; font-weight: 900; color: var(--dark); margin-top: 4px; }
  .pod .pcount small { font-size: 13px; color: var(--muted); font-weight: 400; }
  .pod.p1 .pcount { color: var(--gold); }
  @media (min-width: 621px) { .pod.p1 { transform: translateY(-10px); } }

  .board { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .lrow { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
  .lrow:last-child { border-bottom: 0; }
  .lrow .rk { width: 26px; text-align: center; font-weight: 700; color: var(--muted); }
  .lrow .lname { flex: 1; font-weight: 500; }
  .lrow .bar { width: 40%; max-width: 240px; height: 8px; background: var(--soft); border-radius: 6px; overflow: hidden; }
  .lrow .bar span { display: block; height: 100%; background: var(--red); }
  .lrow .lc { width: 74px; text-align: right; font-weight: 700; color: var(--red-dark); }
  .lrow .lc small { font-weight: 400; color: var(--muted); font-size: 12px; }
  .empty { padding: 26px 16px; text-align: center; color: var(--muted); }

  .youbar { display: flex; gap: 10px; flex-wrap: wrap; margin: 6px 0 2px; }
  .youbar select, .youbar input { font: inherit; padding: 9px 12px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; color: var(--ink); }
  .youbar input { flex: 1; min-width: 200px; }

  .review { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
  .review .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
  .b-google { background: #e6f1fb; color: #0c447c; }
  .b-trustpilot { background: #e1f5ee; color: #0f6e56; }
  .b-productreview { background: #fadfd4; color: #8a3316; }
  .b-showroom { background: var(--soft); color: var(--dark); }
  .stars { color: var(--star); font-size: 13px; letter-spacing: 1px; }
  .review .who { font-size: 13px; color: var(--muted); }
  .review .staff { margin-left: auto; font-size: 12.5px; color: var(--good); display: inline-flex; align-items: center; gap: 5px; font-weight: 700; }
  .review .body { font-size: 14.5px; line-height: 1.55; }
  .review .body.t { font-weight: 700; }

  .muted { color: var(--muted); }
  .loading { text-align: center; padding: 64px 0; color: var(--muted); }
  a.rev-link { color: var(--red-dark); text-decoration: none; font-size: 12.5px; }
  .foot { margin-top: 40px; font-size: 12.5px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div>
        <div class="wordmark">WYN<span>STAN</span></div>
        <small>Blinds · Curtains · Shutters · Awnings · Crimsafe</small>
      </div>
      <div class="subtitle">Team 5-Star Board</div>
    </div>
    <div style="text-align:right;">
      <div class="subtitle" id="updated"></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="content" class="loading">Loading the board…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const CONFIG = {
  // Same published tabs as the main Wynstan dashboard.
  csvUrl:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-1uGKZHQmLB4UysFIsWfpuiX9bdmu8av6_vw1L-bDt_hpoQICZ4nndrsLD8QktgMLEsY63b7uNsKz/pub?gid=2022928861&single=true&output=csv',
  staffCsvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-1uGKZHQmLB4UysFIsWfpuiX9bdmu8av6_vw1L-bDt_hpoQICZ4nndrsLD8QktgMLEsY63b7uNsKz/pub?gid=1672934192&single=true&output=csv',
};

const $  = (sel, el = document) => el.querySelector(sel);
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
const fmt = (n) => n.toLocaleString('en-AU');
const monthKey = (d) => { const m = String(d || '').match(/(\d{4})-(\d{2})/); if (m) return m[1] + '-' + m[2]; const dt = new Date(d); return isNaN(dt) ? '' : dt.toISOString().slice(0, 7); };
const yearKey  = (d) => { const k = monthKey(d); return k ? k.slice(0, 4) : ''; };
const dateVal  = (d) => { const t = new Date(d).getTime(); return isNaN(t) ? 0 : t; };
const stars = () => '★★★★★';
const splitNames = (s) => String(s == null ? '' : s).split(',').map((x) => x.trim()).filter(Boolean);
const NONE_TAGS = new Set(['none', 'no one', 'noone', 'nobody', 'n/a', 'na', '-', 'x']);
const staffUnion = (r) => {
  const man = splitNames(r['Staff (manual)']);
  if (man.length) { if (man.length === 1 && NONE_TAGS.has(man[0].toLowerCase())) return []; return [...new Set(man)]; }
  return [...new Set(splitNames(r['Staff Mentioned']))];
};
const ROLE = {};   // name -> raw role string (from Staff CSV) — source of truth for Wynstan
const roleOf = (n) => { const r = ROLE[n]; return /install/i.test(r || '') ? 'installer' : 'rep'; };
const ROLE_LABEL = { rep: 'Sales Reps', installer: 'Installers' };

let FIVE = [];
let STATE = { role: 'rep', month: '', year: '' };

function boot() {
  const go = () => Papa.parse(CONFIG.csvUrl, {
    download: true, header: true, skipEmptyLines: true,
    complete: (res) => {
      const all = res.data.filter((r) => r.Source);
      FIVE = all.filter((r) => Math.round(num(r.Rating)) === 5);
      FIVE.forEach((r) => { r._staff = staffUnion(r); });
      const lastCap = all.map((r) => r['Captured At']).filter(Boolean).sort().pop();
      $('#updated').textContent = lastCap ? 'Updated ' + new Date(lastCap).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
      render();
    },
    error: (err) => { $('#content').innerHTML = '<div class="loading">Couldn\'t load the sheet CSV.<br><span class="muted">' + esc(err.message || err) + '</span></div>'; },
  });
  if (CONFIG.staffCsvUrl && !/PASTE_/.test(CONFIG.staffCsvUrl)) {
    Papa.parse(CONFIG.staffCsvUrl, {
      download: true, header: true, skipEmptyLines: true,
      complete: (s) => { s.data.forEach((row) => { const n = String(row.Name || '').trim(); if (n) ROLE[n] = String(row.Role || '').trim(); }); go(); },
      error: go,
    });
  } else { go(); }
}

function leaderboard(role, filterFn) {
  const tally = {};
  FIVE.forEach((r) => {
    if (!filterFn(r)) return;
    r._staff.forEach((n) => { if (roleOf(n) === role) tally[n] = (tally[n] || 0) + 1; });
  });
  return Object.entries(tally).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
}

function render() {
  if (!FIVE.length) { $('#content').innerHTML = '<div class="empty">No 5-star reviews found yet.</div>'; return; }

  const months = [...new Set(FIVE.map((r) => monthKey(r.Date)).filter(Boolean))].sort().reverse();
  const years  = [...new Set(FIVE.map((r) => yearKey(r.Date)).filter(Boolean))].sort().reverse();
  if (!STATE.month) STATE.month = months[0] || '';
  if (!STATE.year)  STATE.year  = years[0] || '';

  $('#content').classList.remove('loading');
  $('#content').innerHTML = `
    <div class="toggle" id="roleToggle">
      <button data-role="rep">Sales Reps</button>
      <button data-role="installer">Installers</button>
    </div>

    <div class="section-label">
      <span id="monthTitle"></span>
      <span class="spacer"></span>
      <label class="muted" style="font-size:12px;">Month</label>
      <select id="monthSel">${months.map((m) => `<option value="${m}">${monLabel(m)}</option>`).join('')}</select>
    </div>
    <div id="podium"></div>
    <div id="monthBoard" style="margin-top:14px;"></div>

    <div class="section-label">
      <span id="yearTitle"></span>
      <span class="spacer"></span>
      <label class="muted" style="font-size:12px;">Year</label>
      <select id="yearSel">${years.map((y) => `<option value="${y}">${y}</option>`).join('')}</select>
    </div>
    <div id="yearBoard"></div>

    <div class="section-label">All 5-star reviews</div>
    <div class="youbar">
      <select id="fRole"><option value="">Reps &amp; installers</option><option value="rep">Sales reps</option><option value="installer">Installers</option></select>
      <select id="fPerson"><option value="">Anyone</option></select>
      <select id="fMonth"><option value="">All months</option>${months.map((m) => `<option value="${m}">${monLabel(m)}</option>`).join('')}</select>
      <input id="fSearch" type="text" placeholder="Search reviews, a name or showroom" />
    </div>
    <div id="feed"></div>

    <div class="foot">Wynstan — team 5-star board · Google, Trustpilot &amp; ProductReview.com.au<br>
      <span class="muted">Only 5-star reviews are shown. Credit follows the sheet's manual tag, then the auto name-match.</span></div>
  `;

  $('#monthSel').value = STATE.month;
  $('#yearSel').value = STATE.year;
  $('#roleToggle').addEventListener('click', (e) => { const b = e.target.closest('button'); if (!b) return; STATE.role = b.dataset.role; paintRole(); renderBoards(); });
  $('#monthSel').addEventListener('change', (e) => { STATE.month = e.target.value; renderMonthBoard(); });
  $('#yearSel').addEventListener('change', (e) => { STATE.year = e.target.value; renderYearBoard(); });
  ['fRole', 'fPerson', 'fMonth', 'fSearch'].forEach((id) => $('#' + id).addEventListener('input', renderFeed));

  paintRole();
  renderBoards();
  populatePeople();
  renderFeed();
}

function paintRole() {
  document.querySelectorAll('#roleToggle button').forEach((b) => b.classList.toggle('on', b.dataset.role === STATE.role));
}

function renderBoards() { renderMonthBoard(); renderYearBoard(); }

function renderMonthBoard() {
  const rows = leaderboard(STATE.role, (r) => monthKey(r.Date) === STATE.month);
  $('#monthTitle').textContent = `${ROLE_LABEL[STATE.role]} · ${monLabel(STATE.month)}`;
  $('#podium').innerHTML = podiumHtml(rows.slice(0, 3));
  $('#monthBoard').innerHTML = rows.length > 3 ? boardHtml(rows.slice(3), rows[0].count, 4) : (rows.length ? '' : emptyBoard());
}

function renderYearBoard() {
  const rows = leaderboard(STATE.role, (r) => yearKey(r.Date) === STATE.year);
  $('#yearTitle').textContent = `${ROLE_LABEL[STATE.role]} · ${STATE.year} year board`;
  $('#yearBoard').innerHTML = rows.length ? boardHtml(rows, rows[0].count, 1) : emptyBoard();
}

const MEDALS = ['🥇', '🥈', '🥉'];
function podiumHtml(top) {
  if (!top.length) return emptyBoard();
  const order = [top[1], top[0], top[2]];
  const cls = ['p2', 'p1', 'p3'];
  const medalIdx = [1, 0, 2];
  return '<div class="podium">' + order.map((p, i) => {
    if (!p) return '<div></div>';
    return `<div class="pod ${cls[i]}">
      <div class="medal">${MEDALS[medalIdx[i]]}</div>
      <div class="pname">${esc(p.name)}</div>
      <div class="pcount">${p.count}<small> ★5</small></div>
    </div>`;
  }).join('') + '</div>';
}

function boardHtml(rows, max, startRank) {
  return '<div class="board">' + rows.map((p, i) => {
    const w = max ? Math.round(p.count / max * 100) : 0;
    return `<div class="lrow">
      <span class="rk">${startRank + i}</span>
      <span class="lname">${esc(p.name)}</span>
      <span class="bar"><span style="width:${w}%"></span></span>
      <span class="lc">${p.count}<small> ★</small></span>
    </div>`;
  }).join('') + '</div>';
}

function emptyBoard() { return `<div class="board"><div class="empty">No 5-star reviews credited to ${ROLE_LABEL[STATE.role].toLowerCase()} in this period yet.</div></div>`; }

function populatePeople() {
  const names = [...new Set(FIVE.flatMap((r) => r._staff))].sort((a, b) => a.localeCompare(b));
  $('#fPerson').innerHTML = '<option value="">Anyone</option>' + names.map((n) => `<option value="${esc(n)}">${esc(n)} · ${roleOf(n) === 'installer' ? 'Installer' : 'Rep'}</option>`).join('');
}

function renderFeed() {
  const role = $('#fRole').value, person = $('#fPerson').value, mon = $('#fMonth').value;
  const q = $('#fSearch').value.trim().toLowerCase();
  let rows = FIVE.slice().sort((a, b) => dateVal(b.Date) - dateVal(a.Date));
  if (role)   rows = rows.filter((r) => r._staff.some((n) => roleOf(n) === role));
  if (person) rows = rows.filter((r) => r._staff.includes(person));
  if (mon)    rows = rows.filter((r) => monthKey(r.Date) === mon);
  if (q)      rows = rows.filter((r) => ((r.Review || '') + ' ' + (r.Title || '') + ' ' + r._staff.join(' ') + ' ' + (r.Author || '') + ' ' + (r.Showroom || '')).toLowerCase().includes(q));

  const shown = rows.slice(0, 60);
  const bClass = (s) => 'b-' + String(s || '').toLowerCase().replace(/[^a-z]/g, '');
  $('#feed').innerHTML = (shown.length ? shown.map((r) => {
    const flagged = r._staff.join(', ');
    const when = r.Date ? new Date(r.Date).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
    return `<div class="review">
      <div class="meta">
        <span class="badge ${bClass(r.Source)}">${esc(r.Source)}</span>
        ${r.Showroom ? `<span class="badge b-showroom">${esc(r.Showroom)}</span>` : ''}
        <span class="stars">${stars()}</span>
        <span class="who">${esc(r.Author || 'Anonymous')}${when ? ' · ' + when : ''}</span>
        ${flagged ? `<span class="staff">◆ ${esc(flagged)}</span>` : ''}
      </div>
      ${r.Title ? `<div class="body t">${esc(r.Title)}</div>` : ''}
      <div class="body">${esc(r.Review || '')}</div>
      ${r.URL ? `<div style="margin-top:6px;"><a class="rev-link" href="${esc(r.URL)}" target="_blank" rel="noopener">View original ↗</a></div>` : ''}
    </div>`;
  }).join('') : '<div class="empty">No 5-star reviews match those filters.</div>')
    + (rows.length > shown.length ? `<div class="muted" style="padding:10px 2px;">Showing 60 of ${fmt(rows.length)} — narrow with the filters above.</div>` : '');
}

function monLabel(k) { if (!k) return ''; const [y, m] = k.split('-'); return new Date(y, m - 1, 1).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' }); }

boot();
</script>
</body>
</html>
